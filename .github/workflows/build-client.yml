name: Build Client

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'electron-builder.yml'
      - '.github/workflows/build-client.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            ebuilder_args: --win --x64 --ia32
          - os: macos-latest
            name: macos
            ebuilder_args: --mac --x64 --arm64
          - os: ubuntu-latest
            name: linux
            ebuilder_args: --linux --x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile (production)
        run: npm run compile:prod

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.ebuilder_args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kircraftclient-${{ matrix.name }}
          if-no-files-found: error
          path: |
            build/*.exe
            build/*.dmg
            build/*.AppImage
            build/*.tar.gz

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
